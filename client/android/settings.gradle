pluginManagement {
  def resolveNodePackageRelative = { packageName, basePackage = null ->
    def resolveScript = basePackage == null
      ? "const path = require('path'); process.stdout.write(path.relative(process.cwd(), require.resolve('${packageName}/package.json')))"
      : "const path = require('path'); process.stdout.write(path.relative(process.cwd(), require.resolve('${packageName}/package.json', { paths: [require.resolve('${basePackage}/package.json')] })))"

    return providers.exec {
      workingDir(rootDir)
      commandLine("node", "-e", resolveScript)
    }.standardOutput.asText.get().trim()
  }

  def reactNativeGradlePlugin = new File(
    rootDir,
    resolveNodePackageRelative('@react-native/gradle-plugin', 'react-native')
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    new File(rootDir, resolveNodePackageRelative('expo-modules-autolinking', 'expo')),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = '掌上仓库'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
