// Top-level build file where you can add configuration options common to all sub-projects/modules.

def resolveNodePackageFile = { packageName, basePackage = null, required = true ->
  def resolveScript = basePackage == null
    ? "const path = require('path'); process.stdout.write(path.relative(process.cwd(), require.resolve('${packageName}/package.json')))"
    : "const path = require('path'); process.stdout.write(path.relative(process.cwd(), require.resolve('${packageName}/package.json', { paths: [require.resolve('${basePackage}/package.json')] })))"

  def stdout = new ByteArrayOutputStream()
  def stderr = new ByteArrayOutputStream()
  def result = exec {
    workingDir(rootDir)
    commandLine("node", "-e", resolveScript)
    standardOutput = stdout
    errorOutput = stderr
    ignoreExitValue = true
  }
  if (result.exitValue != 0) {
    if (required) {
      throw new GradleException("Unable to resolve ${packageName}: ${stderr.toString('UTF-8')}")
    }
    return null
  }
  return new File(rootDir, stdout.toString('UTF-8').trim())
}

buildscript {
  ext {
    buildToolsVersion = findProperty('android.buildToolsVersion') ?: '36.0.0'
    minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '30')
    compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
    targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '36')
    kotlinVersion = findProperty('android.kotlinVersion') ?: '2.1.20'
    ndkVersion = '27.1.12297006'
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm.
      url(new File(resolveNodePackageFile('react-native'), '../android'))
    }
    def jscAndroidPackage = resolveNodePackageFile('jsc-android', 'react-native', false)
    if (jscAndroidPackage != null) {
      maven {
        // Android JSC is installed from npm when the package is present.
        url(new File(jscAndroidPackage, '../dist'))
      }
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: 'expo-root-project'
apply plugin: 'com.facebook.react.rootproject'
